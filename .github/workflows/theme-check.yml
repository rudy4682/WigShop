name: Theme Check
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read
  checks: write
jobs:
  theme-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Theme Check (Shopify action)
        uses: shopify/theme-check-action@v2
        with:
          token: ${{ github.token }}

